version: 2
updates:
  # Keep the provided/test/plugin dependency surface current (the core ships zero runtime dependencies,
  # but pgjdbc, drivers, JUnit, Testcontainers, and build plugins still warrant updates).
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Keep GitHub Actions current (and SHA pins fresh once actions are pinned).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
