name: CI

on:
  push:
    branches: [master, develop, 'feature/**']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save time and reduce noise.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (JDK ${{ matrix.jdk }})
    runs-on: ubuntu-latest
    strategy:
      # Do not cancel newer-JDK jobs if another leg fails. Each JDK gives useful signal.
      fail-fast: false
      matrix:
        jdk: ['17', '21', '25']
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: ${{ matrix.jdk }}
          cache: maven

      - name: Verify
        run: mvn -B -ntp verify

      - name: Build Javadoc
        run: mvn -B -ntp javadoc:javadoc

  integration:
    name: ${{ matrix.name }} Integration (JDK 21)
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: PostgreSQL
            profiles: integration
            test: PostgreSqlIntegrationIT
            experimental: false
          - name: MySQL
            profiles: integration
            test: MySqlIntegrationIT
            experimental: false
          - name: SQLite
            profiles: integration
            test: SqliteIntegrationIT
            experimental: false
          - name: SQL Server
            profiles: integration,it-sqlserver
            test: SqlServerIntegrationIT
            experimental: true
          - name: Oracle
            profiles: integration,it-oracle
            test: OracleIntegrationIT
            experimental: true
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '21'
          cache: maven

      - name: Verify ${{ matrix.name }} integration profile
        env:
          ACCEPT_EULA: 'Y'
        run: mvn -B -ntp -P${{ matrix.profiles }} -Dit.test=${{ matrix.test }} verify
